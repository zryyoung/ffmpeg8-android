name: Build FFmpeg 8.0.1 for Android

on:
  workflow_dispatch:    # 支持手动触发

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # - name: Install Android NDK r27
        # run: |
          # echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.2.12479018" > /dev/null
          # echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/27.2.12479018" >> $GITHUB_ENV
      - name: Install Android NDK r21e
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.4.7075529" > /dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/21.4.7075529" >> $GITHUB_ENV
      
      - name: Install required platform & build-tools
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null

      - name: Make script executable
        run: chmod +x ffmpeg-android-maker.sh

      - name: Build FFmpeg only for arm64-v8a
        run: |
          export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export FFMPEG_SOURCE_TYPE=TAR
          export FFMPEG_SOURCE_VALUE=8.0.1
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --android-api-level=21 \
            --disable-x86asm

      - name: Check text relocations (fail if present)
        run: |
          if [ -f stats/text-relocations.txt ] && grep -q TEXTREL stats/text-relocations.txt; then
            echo "Error: Text relocations detected!"
            cat stats/text-relocations.txt
            exit 1
          else
            echo "No text relocations - build successful!"
          fi

      - name: Upload arm64-v8a libraries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-8.0.1-android
          path: |
            output/

      - name: Upload build stats
        uses: actions/upload-artifact@v4
        with:
          name: build-stats-arm64
          path: stats/
          
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-arm64
          path: build/

      # 打包成规范目录结构
      - name: Prepare release folder and zip
        run: |
          cp -r build FFmpeg-8.1-Android-arm64-v8a
          zip -r FFmpeg-8.1-Android-arm64-v8a.zip FFmpeg-8.1-Android-arm64-v8a/

      # 上传到 Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: FFmpeg8.1
          name: FFmpeg 8.1 Android arm64-v8a
          body: |
            - FFmpeg 8.1
            - Android arm64-v8a
            - API 21
            - 解压即文件夹 FFmpeg-8.1-Android-arm64-v8a
          files: FFmpeg-8.1-Android-arm64-v8a.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}